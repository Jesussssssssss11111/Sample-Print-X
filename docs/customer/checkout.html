<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout – Print X</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .checkout-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 32px;
      align-items: start;
    }

    .step-indicator {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 40px;
    }

    .step-ind {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .step-ind-num {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--gray-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--gray-text);
    }

    .step-ind.active .step-ind-num {
      background: var(--red);
      color: white;
      box-shadow: 0 0 16px rgba(255,0,0,0.3);
    }

    .step-ind.done .step-ind-num {
      background: #22c55e;
      color: white;
    }

    .step-ind-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--gray-text);
    }

    .step-ind.active .step-ind-label { color: var(--dark); }

    .step-connector {
      flex: 1;
      height: 2px;
      background: var(--gray-mid);
      margin: 0 12px;
    }

    .order-item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--gray-mid);
      font-size: 0.88rem;
    }

    .order-item-row:last-child { border-bottom: none; }

    .order-item-name { font-weight: 600; }
    .order-item-sub  { color: var(--gray-text); font-size: 0.8rem; }

    .success-box {
      text-align: center;
      padding: 60px 40px;
    }

    .success-icon {
      width: 100px;
      height: 100px;
      background: #d1fae5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 24px;
      animation: successPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes successPop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .success-box h2 {
      color: var(--dark);
      margin-bottom: 12px;
    }

    .success-box p {
      color: var(--gray-text);
      margin-bottom: 32px;
    }

    .order-ref {
      font-family: 'JetBrains Mono', monospace;
      background: var(--gray-light);
      padding: 8px 20px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      display: inline-block;
      margin-bottom: 32px;
      border: 1px solid var(--gray-mid);
    }

    @media (max-width: 768px) {
      .checkout-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <div class="page-header">
    <div class="container">
      <h1>Checkout</h1>
      <p>Complete your order below</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div id="checkoutContent">
        <div class="loading-wrap">
          <div class="spinner"></div>
          <span>Loading checkout...</span>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer" id="footer"></footer>
  <div class="toast-container"></div>

  <script src="../assets/js/script.js"></script>
  <script>
    renderNavbar('');

    let cartItems = [];
    let cartTotal = 0;

    async function initCheckout() {
      const content = document.getElementById('checkoutContent');

      if (!requireAuth()) return;

      const res = await apiFetch('/cart/');
      if (!res.ok || res.data.cart.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="icon">🛒</div>
            <h3>Nothing to Checkout</h3>
            <p>Your cart is empty. Add some products first!</p>
            <a href="product.html" class="btn btn-primary">Browse Products</a>
          </div>`;
        return;
      }

      cartItems = res.data.cart;
      cartTotal = res.data.total;
      renderCheckout();
    }

    function togglePaymentOptions() {
      const payment = document.getElementById('payment').value;
      const total = cartTotal.toFixed(2);
      const ref = 'PRINTX' + Date.now();
      document.querySelectorAll('.payment-container').forEach(c => c.style.display = 'none');

      // Show reference number field for all non-COD methods
      const refGroup = document.getElementById('refNumGroup');
      if (payment === 'cod') {
        refGroup.style.display = 'none';
        document.getElementById('refNumber').removeAttribute('required');
      } else {
        refGroup.style.display = 'block';
        document.getElementById('refNumber').setAttribute('required', 'required');
      }

      if (payment === 'gcash') {
        document.getElementById('gcash-container').style.display = 'block';
        document.getElementById('gcash-amount').textContent = total;
        document.getElementById('order-ref').textContent = ref;
        generateQRCode(`gcash://pay?amount=${total}&ref=${ref}`);
      } else if (payment === 'maya') {
        document.getElementById('maya-container').style.display = 'block';
        document.getElementById('maya-amount').textContent = total;
        document.getElementById('maya-link').textContent = `maya.com/pay?amount=${total}&ref=${ref}`;
      } else if (payment === 'bank') {
        document.getElementById('bank-container').style.display = 'block';
        document.getElementById('bank-amount').textContent = total;
        document.getElementById('bank-ref').textContent = ref;
      }
    }

    function generateQRCode(text) {
      const canvas = document.getElementById('gcash-qr');
      const ctx = canvas.getContext('2d');
      canvas.width = 256;
      canvas.height = 256;
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, 256, 256);
      ctx.fillStyle = '#000';
      ctx.font = '20px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('GCASH QR', 128, 128);
      ctx.fillText(text.substring(0,20) + '...', 128, 160);
      ctx.font = '12px monospace';
      ctx.fillText('Scan to Pay', 128, 190);
    }

    function copyPaymentInfo(type) {
      const link = document.getElementById(type + '-link').textContent;
      navigator.clipboard.writeText(link);
      Toast.success('Payment link copied!');
    }

    function copyBankDetails() {
      const details = `BPI 1234-5678-90\nPrint X Trading\nAmount: ₱${cartTotal.toFixed(2)}\nRef: ${document.getElementById('bank-ref').textContent}`;
      navigator.clipboard.writeText(details);
      Toast.success('Bank details copied!');
    }

    function generateQRCode(text) {
      const canvas = document.getElementById('gcash-qr');
      // Simple placeholder QR (replace with qrcode library or API)
      const ctx = canvas.getContext('2d');
      canvas.width = 256;
      canvas.height = 256;
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, 256, 256);
      ctx.fillStyle = '#000';
      ctx.font = '20px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('GCASH QR', 128, 128);
      ctx.fillText(text.substring(0,20) + '...', 128, 160);
      ctx.font = '12px monospace';
      ctx.fillText('Scan to Pay', 128, 190);
    }

    function renderCheckout() {
      const content = document.getElementById('checkoutContent');
      const user = Auth.getUser();

      content.innerHTML = `
        <div class="step-indicator">
          <div class="step-ind done">
            <div class="step-ind-num">✓</div>
            <div class="step-ind-label">Cart</div>
          </div>
          <div class="step-connector"></div>
          <div class="step-ind active">
            <div class="step-ind-num">2</div>
            <div class="step-ind-label">Checkout</div>
          </div>
          <div class="step-connector"></div>
          <div class="step-ind">
            <div class="step-ind-num">3</div>
            <div class="step-ind-label">Confirmation</div>
          </div>
        </div>

        <div class="checkout-layout">
          <div class="card">
            <h3 style="font-family:'Orbitron',monospace;margin-bottom:24px;">Delivery Information</h3>
            
            <div class="grid-2" style="gap:16px;">
              <div class="form-group">
                <label>First Name</label>
                <input type="text" class="form-control" id="firstName" value="${user?.first_name || ''}" placeholder="Juan" />
              </div>
              <div class="form-group">
                <label>Last Name</label>
                <input type="text" class="form-control" id="lastName" value="${user?.last_name || ''}" placeholder="dela Cruz" />
              </div>
            </div>

            <div class="form-group">
              <label>Email Address</label>
              <input type="email" class="form-control" id="email" value="${user?.email || ''}" placeholder="juan@email.com" />
            </div>

            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" class="form-control" id="phone" placeholder="+63 912 345 6789" />
            </div>

            <div class="form-group">
              <label>Full Delivery Address <span style="color:var(--red)">*</span></label>
              <textarea class="form-control" id="address" rows="3" placeholder="House/Unit No., Street, Barangay, City/Municipality, Province, ZIP Code"></textarea>
            </div>

            <div class="form-group">
              <label>Payment Method</label>
              <select class="form-control" id="payment" onchange="togglePaymentOptions()">
                <option value="cod">Cash on Delivery (COD)</option>
                <option value="gcash">GCash</option>
                <option value="maya">Maya (PayMaya)</option>
                <option value="bank">Bank Transfer</option>
              </select>
              <div id="gcash-container" class="payment-container" style="display:none; margin-top:16px;">
                <div style="background:#1f2937; border-radius:12px; padding:24px; margin-bottom:12px;">
                  <div style="font-size:3rem; margin-bottom:12px;">💚</div>
                  <div style="color:white; font-family:'JetBrains Mono'; font-size:0.9rem;">Scan to Pay ₱<span id="gcash-amount"></span></div>
                </div>
                <canvas id="gcash-qr" style="display:block; margin:0 auto; border:1px solid #e5e7eb; border-radius:8px;"></canvas>
                <div style="font-size:0.8rem; color:var(--gray-text); margin-top:8px;">Reference: ORDER-<span id="order-ref"></span></div>
              </div>
              <div id="maya-container" class="payment-container" style="display:none; margin-top:16px;">
                <div style="background:#00d4aa; border-radius:12px; padding:24px; margin-bottom:12px; text-align:center;">
                  <div style="font-size:3rem; margin-bottom:12px;">💙</div>
                  <div style="color:white; font-family:'JetBrains Mono'; font-size:0.9rem;">Pay ₱<span id="maya-amount"></span> via Maya</div>
                </div>
                <div style="text-align:center;">
                  <button onclick="copyPaymentInfo('maya')" class="btn btn-primary btn-sm" style="margin-bottom:8px;">Copy Payment Link</button>
                  <div id="maya-link" style="font-size:0.8rem; color:var(--gray-text); word-break:break-all;">maya.com/pay?amount=xxx</div>
                </div>
              </div>
              <div id="bank-container" class="payment-container" style="display:none; margin-top:16px;">
                <div style="background:#f3f4f6; border-radius:12px; padding:24px;">
                  <div style="font-size:2rem; margin-bottom:12px; text-align:center;">🏦</div>
                  <h4 style="margin-bottom:16px;">Bank Deposit</h4>
                  <div style="font-family:'JetBrains Mono'; font-size:0.85rem; margin-bottom:12px;">
                    <strong>Amount:</strong> ₱<span id="bank-amount"></span>
                  </div>
                  <div style="font-family:'JetBrains Mono'; font-size:0.8rem;">
                    <div><strong>BPI</strong> 1234-5678-90</div>
                    <div>Account Name: Print X Trading</div>
                    <div style="color:var(--red);">Ref: <span id="bank-ref"></span></div>
                  </div>
                  <button onclick="copyBankDetails()" class="btn btn-primary btn-sm mt-12" style="width:100%;">Copy Bank Details</button>
                </div>
              </div>
            </div>

            <div class="form-group">
              <label>Order Notes (Optional)</label>
              <textarea class="form-control" id="notes" rows="2" placeholder="Any special instructions for your order..."></textarea>
            </div>

            <div class="form-group" id="refNumGroup" style="display:none;">
              <label>Payment Reference Number <span style="color:var(--red)">*</span></label>
              <input type="text" class="form-control" id="refNumber"
                placeholder="e.g. GCash ref: 1234567890 / Bank transaction ID"
                style="font-family:'JetBrains Mono',monospace; letter-spacing:0.04em;" />
              <p style="font-size:0.78rem; color:var(--gray-text); margin-top:6px;">
                📋 Enter the reference / transaction number from your payment receipt so we can verify your payment quickly.
              </p>
            </div>
          </div>

          <div>
            <div class="card">
              <h3 style="font-family:'Orbitron',monospace;margin-bottom:20px;">Order Summary</h3>
              <div id="checkoutItems">
                ${cartItems.map(item => `
                  <div class="order-item-row">
                    <div>
                      <div class="order-item-name">${item.product.name}</div>
                      <div class="order-item-sub">×${item.quantity} @ ${formatPrice(item.product.price)}</div>
                    </div>
                    <div style="font-weight:700;">${formatPrice(item.subtotal)}</div>
                  </div>
                `).join('')}
              </div>
              <div class="divider"></div>
              <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.88rem;">
                <span>Subtotal</span>
                <span>${formatPrice(cartTotal)}</span>
              </div>
              <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.88rem;color:var(--gray-text);">
                <span>Shipping</span>
                <span style="color:#22c55e;">FREE</span>
              </div>
              <div class="divider"></div>
              <div style="display:flex;justify-content:space-between;font-family:'Orbitron',monospace;font-weight:900;font-size:1.1rem;">
                <span>Total</span>
                <span style="color:var(--red);">${formatPrice(cartTotal)}</span>
              </div>
              <button class="btn btn-primary btn-full mt-24" style="font-size:1rem;padding:16px;" onclick="placeOrder()">
                ✓ Place Order
              </button>
<a href="cart.html" class="btn btn-outline btn-full mt-12" style="text-align:center;">← Back to Cart</a>

<a href="product.html" class="btn btn-outline btn-full mt-16" style="text-align:center;">
              Continue Shopping →
            </a>
            </div>
          </div>
        </div>
      `;
    }

    async function placeOrder() {
      const address = document.getElementById('address').value.trim();
      if (!address) {
        Toast.error('Please enter your delivery address.');
        document.getElementById('address').focus();
        return;
      }

      const payment = document.getElementById('payment').value;
      const refNumber = document.getElementById('refNumber') ? document.getElementById('refNumber').value.trim() : '';

      // Require reference number for non-COD payments
      if (payment !== 'cod' && !refNumber) {
        Toast.error('Please enter your payment reference number.');
        document.getElementById('refNumber').focus();
        return;
      }

      const btn = event.target;
      btn.disabled = true;
      btn.textContent = 'Placing order...';

      const res = await apiFetch('/checkout/', {
        method: 'POST',
        body: JSON.stringify({ address, payment_method: payment, reference_number: refNumber }),
      });

      if (res.ok) {
        showSuccessScreen(res.data.order);
        updateCartCount();
      } else {
        Toast.error(res.data.error || 'Failed to place order.');
        btn.disabled = false;
        btn.textContent = '✓ Place Order';
      }
    }

    function showSuccessScreen(order) {
      const content = document.getElementById('checkoutContent');
      content.innerHTML = `
        <div class="card success-box">
          <div class="success-icon">✓</div>
          <h2>Order Placed Successfully!</h2>
          <p>Thank you for your order! We'll start preparing it right away.</p>
          <div class="order-ref">Order #${order.id}</div>
          <p style="color:var(--gray-text);font-size:0.85rem;margin-bottom:32px;">
            Total: <strong style="color:var(--red)">${formatPrice(order.total_price)}</strong> 
            · Status: <span class="badge badge-pending">${order.status}</span>
          </p>
          <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;">
            <a href="orders.html" class="btn btn-primary">View My Orders</a>
            <a href="product.html" class="btn btn-outline">Continue Shopping</a>
          </div>
        </div>
      `;
    }

    initCheckout();
  </script>
</body>
</html>
