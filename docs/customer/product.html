<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products – Print X</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<nav class="navbar" id="main-navbar"></nav>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrapper">
  <div class="page-header">
    <div class="container page-header-content">
      <div class="section-label">CATALOG</div>
      <h1>Our <span style="color:var(--red)">Products</span></h1>
      <p>Browse our collection of precision 3D printed items</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <!-- Filters -->
      <div class="filters-bar">
        <input type="text" id="search-input" class="form-control" placeholder="Search products..." style="max-width:320px;" oninput="filterProducts()">
        <select id="sort-select" class="form-control" style="max-width:180px;" onchange="filterProducts()">
          <option value="default">Sort: Default</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name">Name A–Z</option>
        </select>
        <span id="product-count" class="font-mono" style="font-size:0.8rem;color:var(--text-muted);align-self:center;"></span>
      </div>

      <div class="products-grid" id="products-grid">
        <div class="loading-spinner" style="grid-column:1/-1">
          <div class="spinner"></div><span>LOADING PRODUCTS</span>
        </div>
      </div>
    </div>
  </section>
</div>

<footer>
  <div class="footer-brand">PRINT<span>X</span></div>
  <div>© 2024 Print X. All rights reserved.</div>
</footer>

<script src="../assets/js/script.js"></script>
<script>
let allProducts = [];

async function loadProducts() {
  const { ok, data } = await apiFetch('/products/');
  if (!ok) {
    document.getElementById('products-grid').innerHTML =
      `<div class="empty-state" style="grid-column:1/-1"><p style="color:var(--red)">${data.error || 'Failed to load products'}</p><p>Make sure Django server is running: <code>python manage.py runserver</code></p></div>`;
    return;
  }
  allProducts = data.products;
  renderProducts(allProducts);
}

function filterProducts() {
  const query = document.getElementById('search-input').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;
  let filtered = allProducts.filter(p =>
    p.name.toLowerCase().includes(query) || p.description.toLowerCase().includes(query)
  );
  if (sort === 'price-asc') filtered.sort((a, b) => a.price - b.price);
  else if (sort === 'price-desc') filtered.sort((a, b) => b.price - a.price);
  else if (sort === 'name') filtered.sort((a, b) => a.name.localeCompare(b.name));
  renderProducts(filtered);
}

function renderProducts(products) {
  const grid = document.getElementById('products-grid');
  const count = document.getElementById('product-count');
  count.textContent = `${products.length} item${products.length !== 1 ? 's' : ''}`;

  if (products.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-state-icon">🔍</div>
        <h3>No Products Found</h3>
        <p>Try a different search term.</p>
      </div>`;
    return;
  }

  grid.innerHTML = products.map(p => `
    <div class="product-card">
      ${p.image
        ? `<img src="${p.image}" alt="${p.name}" class="product-card-img" loading="lazy" onerror="this.outerHTML='<div class=\'product-card-img-placeholder\'>NO IMAGE</div>'">`
        : `<div class="product-card-img-placeholder">NO IMAGE</div>`}
      <div class="product-card-body">
        <div class="product-card-name">${p.name}</div>
        <div class="product-card-desc">${p.description}</div>
        <div class="product-card-footer">
          <span class="product-price">${formatPrice(p.price)}</span>
          <button class="btn btn-primary btn-sm" onclick="addToCart(${p.id}, '${p.name.replace(/'/g,"\\'")}')">
            Add to Cart
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

document.addEventListener('DOMContentLoaded', loadProducts);
</script>

<style>
.filters-bar {
  display: flex;
  gap: 1rem;
  margin-bottom: 2rem;
  flex-wrap: wrap;
  align-items: center;
}
</style>

</body>
</html>
