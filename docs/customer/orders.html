<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <title>My Orders – Print X</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<nav class="navbar" id="main-navbar"></nav>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrapper">
  <div class="page-header">
    <div class="container page-header-content">
      <div class="section-label">ORDERS</div>
      <h1>My <span style="color:var(--red)">Orders</span></h1>
      <p>Track your 3D print orders and custom requests</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="admin-table-wrap" style="max-width:1200px;margin:0 auto;">
        <div class="admin-table-header" style="padding:24px;">
          <h3 style="font-family:var(--font-display);font-size:1.1rem;">Order History</h3>
          <span id="ordersCount" class="font-mono" style="font-size:0.9rem;color:var(--text-muted);"></span>
        </div>
        <div class="table-wrap" style="overflow:auto;">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Date</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="ordersTable">
              <tr><td colspan="6" class="text-center text-gray" style="padding:40px;">
                <div style="font-size:4rem;margin-bottom:1rem;">📦</div>
                <div>No orders yet</div>
                <div style="color:var(--text-muted);font-size:0.9rem;">Start shopping from <a href="../customer/product.html">Products</a></div>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </section>
</div>

<footer>
  <div class="footer-brand">PRINT<span>X</span></div>
  <div>© 2024 Print X. All rights reserved.</div>
</footer>

 <script src="../assets/js/script.js"></script>
<script>
(function(){
  'use strict';
  if (!requireLogin()) return;

  async function loadOrders() {
    const { ok, data } = await apiFetch('/orders/');
    const tbody = document.getElementById('ordersTable');
    const countEl = document.getElementById('ordersCount');
    
    if (!ok) {
      tbody.innerHTML = `<tr><td colspan="5" class="text-center text-gray" style="padding:40px;">${data.error || 'Failed to load orders'}</td></tr>`;
      return;
    }

    const orders = data.orders || [];
    countEl.textContent = `${orders.length} order${orders.length !== 1 ? 's' : ''}`;

    if (orders.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="text-center text-gray" style="padding:40px;">
        <div style="font-size:4rem;margin-bottom:1rem;">📦</div>
        <div>No orders yet</div>
        <div style="color:var(--text-muted);font-size:0.9rem;">Start shopping from <a href="../customer/product.html">Products</a></div>
      </td></tr>`;
      return;
    }

    tbody.innerHTML = orders.map(o => {
      const itemSummary = (o.items || []).slice(0,2).map(i => `${i.product_name || i.name} ×${i.quantity}`).join(', ') + (o.items.length > 2 ? '...' : '');
      const canDelete = o.status === 'cancelled' || o.status === 'delivered';
      return `
        <tr onclick="showOrderDetails(${o.id})" style="cursor:pointer;">
          <td style="font-family:var(--font-mono);font-weight:600;">#${o.id}</td>
          <td style="font-size:0.9rem;">${formatDate(o.date)}</td>
          <td style="max-width:300px;font-size:0.88rem;">${itemSummary}</td>
          <td style="font-family:var(--font-display);color:var(--red);font-weight:700;font-size:1.1rem;">${formatPrice(o.total_price)}</td>
          <td>${statusBadge(o.status)}</td>
          <td>${canDelete ? '<button class=\"btn btn-danger btn-sm\" onclick=\"event.stopPropagation(); deleteOrder(' + o.id + ')\">Delete</button>' : ''}</td>
        </tr>`;
    }).join('');
  }

  window.showOrderDetails = function(id) {
    showModal(`
      <div class="modal-lg">
        <div class="modal-header">
          <h3>Order Details</h3>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div id="orderDetailsContent" style="padding:1.5rem;">
          <div class="loading-spinner"><div class="spinner"></div>Loading...</div>
        </div>
      </div>
    `);
    loadOrderDetails(id);
  }

  async function loadOrderDetails(id) {
    const { ok, data } = await apiFetch('/orders/');
    const order = data.orders.find(o => o.id == id);
    const content = document.getElementById('orderDetailsContent');
    if (!order) {
      content.innerHTML = '<p>Order not found.</p>';
      return;
    }
    const itemsHtml = (order.items || []).map(i => `
      <div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--gray-light);">
        <div><strong>${i.product_name || i.name}</strong> ×${i.quantity}</div>
        <div>${formatPrice(i.subtotal)}</div>
      </div>
    `).join('') || '<p>No items</p>';
    const canDelete = order.status === 'cancelled' || order.status === 'delivered';
    content.innerHTML = `
      <div style="font-family:var(--font-mono);font-size:0.9rem;margin-bottom:1rem;">Order #${order.id}</div>
      <div style="background:var(--gray-light);padding:1rem;border-radius:var(--radius);margin-bottom:1.5rem;">
        <strong>Status:</strong> ${statusBadge(order.status)}<br>
        <strong>Date:</strong> ${formatDate(order.date)}<br>
        <strong>Total:</strong> ${formatPrice(order.total_price)}
        ${canDelete ? '<br><button class=\"btn btn-danger btn-sm mt-8\" onclick=\"deleteOrder(' + order.id + ')\">Delete Order</button>' : ''}
      </div>
      <h4>Items:</h4>
      ${itemsHtml}
    `;
  }

  async function deleteOrder(id) {
    if (!confirm(`Delete Order #${id}? This cannot be undone.`)) return;
    const { ok, data } = await apiFetch(`/orders/delete/${id}/`, { method: 'DELETE' });
    if (ok) {
      Toast.success('Order deleted successfully.');
      loadOrders();
    } else {
      Toast.error(data.error || 'Failed to delete order.');
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadOrders();
    // Real-time polling for order status updates from admin
    setInterval(loadOrders, 5000);
  });
})();
</script>

<style>
table { width: 100%; border-collapse: collapse; }
th, td { padding: 16px 12px; text-align: left; border-bottom: 1px solid var(--gray-light); }
th { font-weight: 700; color: var(--dark); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
tr:hover { background: var(--gray-light); }
tr .btn { margin: 0; }
.admin-table-wrap { box-shadow: var(--shadow-sm); border-radius: var(--radius-lg); overflow: hidden; }
</style>

</body>
</html>
