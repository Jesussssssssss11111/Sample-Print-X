<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart – Print X</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 32px;
      align-items: start;
    }

    .cart-item {
      display: flex;
      gap: 20px;
      padding: 20px 0;
      border-bottom: 1px solid var(--gray-mid);
      align-items: center;
    }

    .cart-item:last-child { border-bottom: none; }

    .cart-item-img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: var(--radius);
      background: var(--gray-light);
      flex-shrink: 0;
    }

    .cart-item-placeholder {
      width: 90px;
      height: 90px;
      background: var(--gray-light);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-name {
      font-family: 'Orbitron', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .cart-item-price {
      color: var(--red);
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: var(--gray-light);
      border: 1px solid var(--gray-mid);
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 700;
    }

    .qty-btn:hover { background: var(--red); color: white; border-color: var(--red); }

    .qty-display {
      min-width: 36px;
      text-align: center;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .cart-item-remove {
      background: none;
      border: none;
      color: var(--gray-text);
      cursor: pointer;
      padding: 8px;
      border-radius: var(--radius);
      transition: all var(--transition);
      font-size: 1.1rem;
    }

    .cart-item-remove:hover {
      background: #fee2e2;
      color: var(--red);
    }

    .cart-subtotal {
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      color: var(--gray-text);
      margin-top: 8px;
    }

    /* Summary Card */
    .summary-card {
      background: var(--white);
      border: 1px solid var(--gray-mid);
      border-radius: var(--radius-lg);
      padding: 28px;
      box-shadow: var(--shadow);
      position: sticky;
      top: calc(var(--nav-height) + 20px);
    }

    .summary-card h3 {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--gray-mid);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }

    .summary-row.total {
      border-top: 2px solid var(--dark);
      padding-top: 16px;
      margin-top: 16px;
      font-weight: 700;
      font-size: 1.1rem;
      font-family: 'Orbitron', monospace;
    }

    .summary-row.total span:last-child {
      color: var(--red);
    }

    @media (max-width: 768px) {
      .cart-layout { grid-template-columns: 1fr; }
      .summary-card { position: static; }
    }
  </style>
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <div class="page-header">
    <div class="container">
      <h1>🛒 Your Cart</h1>
      <p>Review your items before checkout</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div id="cartContent">
        <div class="loading-wrap">
          <div class="spinner"></div>
          <span>Loading cart...</span>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer" id="footer"></footer>
  <div class="toast-container"></div>

  <script src="../assets/js/script.js"></script>
  <script>
    renderNavbar('cart');

    let cartData = [];

    async function loadCart() {
      const content = document.getElementById('cartContent');

      if (!Auth.isLoggedIn()) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="icon">🔐</div>
            <h3>Login Required</h3>
            <p>Please login to view your cart.</p>
            <a href="login.html" class="btn btn-primary">Login Now</a>
          </div>`;
        return;
      }

      const res = await apiFetch('/cart/');
      if (!res.ok) {
        content.innerHTML = `<p class="text-center text-gray">Failed to load cart.</p>`;
        return;
      }

      cartData = res.data.cart;
      const total = res.data.total;

      if (cartData.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="icon">🛒</div>
            <h3>Your Cart is Empty</h3>
            <p>Browse our products and add something awesome!</p>
            <a href="product.html" class="btn btn-primary">Browse Product
          </div>`;
        return;
      }

      content.innerHTML = `
        <div class="cart-layout">
          <div class="card">
            <h3 style="font-family:'Orbitron',monospace;margin-bottom:8px;">Cart Items (${cartData.length})</h3>
            <div id="cartItems"></div>
          </div>
          <div class="summary-card">
            <h3>Order Summary</h3>
            <div id="summaryRows"></div>
            <div class="summary-row total">
              <span>Total</span>
              <span id="grandTotal">${formatPrice(total)}</span>
            </div>
            <button class="btn btn-primary btn-full mt-24" onclick="goCheckout()" style="font-size:1rem;padding:14px;">
              Proceed to Checkout →
            </button>
<a href="product.html" class="btn btn-outline btn-full mt-16" style="text-align:center;">
              ← Continue Shopping
            </a>
          </div>
        </div>
      `;

      renderCartItems();
      renderSummary(total);
    }

    function renderCartItems() {
      const container = document.getElementById('cartItems');
      container.innerHTML = cartData.map(item => `
        <div class="cart-item" id="cartItem-${item.id}">
          <img src="${item.product.image || ''}" alt="${item.product.name}" class="cart-item-img"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
          <div class="cart-item-placeholder" style="${item.product.image ? 'display:none' : ''}">🖨️</div>
          <div class="cart-item-info">
            <div class="cart-item-name">${item.product.name}</div>
            <div class="cart-item-price">${formatPrice(item.product.price)} each</div>
            <div class="qty-controls">
              <button class="qty-btn" onclick="changeQty(${item.id}, ${item.quantity - 1})">−</button>
              <span class="qty-display" id="qty-${item.id}">${item.quantity}</span>
              <button class="qty-btn" onclick="changeQty(${item.id}, ${item.quantity + 1})">+</button>
            </div>
            <div class="cart-subtotal">Subtotal: ${formatPrice(item.subtotal)}</div>
          </div>
          <button class="cart-item-remove" onclick="removeItem(${item.id})" title="Remove">🗑️</button>
        </div>
      `).join('');
    }

    function renderSummary(total) {
      const rows = document.getElementById('summaryRows');
      rows.innerHTML = cartData.map(item => `
        <div class="summary-row">
          <span>${item.product.name} ×${item.quantity}</span>
          <span>${formatPrice(item.subtotal)}</span>
        </div>
      `).join('');
      document.getElementById('grandTotal').textContent = formatPrice(total);
    }

    async function changeQty(itemId, newQty) {
      if (newQty <= 0) {
        removeItem(itemId);
        return;
      }
      const res = await apiFetch(`/cart/update/${itemId}/`, {
        method: 'PUT',
        body: JSON.stringify({ quantity: newQty }),
      });
      if (res.ok) {
        loadCart();
        updateCartCount();
      } else {
        Toast.error(res.data.error || 'Update failed.');
      }
    }

    async function removeItem(itemId) {
      const res = await apiFetch(`/cart/remove/${itemId}/`, { method: 'DELETE' });
      if (res.ok) {
        Toast.info('Item removed from cart.');
        loadCart();
        updateCartCount();
      } else {
        Toast.error('Failed to remove item.');
      }
    }

    function goCheckout() {
      if (cartData.length === 0) {
        Toast.error('Your cart is empty.');
        return;
      }
      window.location.href = 'checkout.html';
    }

    loadCart();
  </script>
</body>
</html>
