<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse Print X's collection of precision 3D printed products.">
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <title>Products – Print X</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<header class="navbar" id="navbar"></header>
<div class="toast-container"></div>

<div class="page-wrapper">
  <div class="page-header">
    <div class="container">
      <span class="section-label">CATALOG</span>
      <h1>Our <span style="color:var(--red)">Products</span></h1>
      <p>Browse our collection of precision 3D printed items</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="filters-bar">
        <input type="text" id="search-input" class="form-control"
          placeholder="Search products…" style="max-width:320px;" oninput="filterProducts()">
        <select id="sort-select" class="form-control" style="max-width:200px;" onchange="filterProducts()">
          <option value="default">Sort: Default</option>
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
          <option value="name">Name A–Z</option>
        </select>
        <span id="product-count" class="font-mono text-gray text-sm"></span>
      </div>

      <div class="products-grid" id="products-grid">
        <div class="loading-wrap">
          <div class="spinner"></div>
          <span>Loading products…</span>
        </div>
      </div>
    </div>
  </section>
</div>

<footer class="footer" id="footer"></footer>

<script src="../assets/js/script.js"></script>
<script>
let allProducts = [];

async function loadProducts() {
  const grid = document.getElementById('products-grid');
  try {
    const { ok, data } = await apiFetch('/products/');
    if (!ok) {
      grid.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h3>Could Not Load Products</h3><p>Please try again later.</p></div>';
      return;
    }
    allProducts = data.products || [];
    renderProducts(allProducts);
  } catch {
    grid.innerHTML = '<div class="empty-state"><div class="icon">🖨️</div><h3>Store Coming Soon</h3><p>Our product catalog is being set up!</p></div>';
  }
}

function filterProducts() {
  const query = document.getElementById('search-input').value.toLowerCase().trim();
  const sort  = document.getElementById('sort-select').value;
  let filtered = allProducts.filter(p =>
    (p.name || '').toLowerCase().includes(query) ||
    (p.description || '').toLowerCase().includes(query)
  );
  if (sort === 'price-asc')       filtered.sort((a, b) => a.price - b.price);
  else if (sort === 'price-desc') filtered.sort((a, b) => b.price - a.price);
  else if (sort === 'name')       filtered.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  renderProducts(filtered);
}

function renderProducts(products) {
  const grid  = document.getElementById('products-grid');
  const count = document.getElementById('product-count');
  count.textContent = products.length + ' item' + (products.length !== 1 ? 's' : '');

  if (products.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><h3>No Products Found</h3><p>Try a different search term.</p></div>';
    return;
  }

  grid.innerHTML = products.map(function(p) {
    var imgHtml = p.image
      ? '<img src="' + p.image + '" alt="' + p.name + '" class="product-card-image" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
      : '';
    return '<div class="product-card">' +
      imgHtml +
      '<div class="product-card-image-placeholder" style="' + (p.image ? 'display:none' : '') + '">🖨️</div>' +
      '<div class="product-card-body">' +
        '<div class="product-card-name">' + (p.name || 'Product') + '</div>' +
        '<div class="product-card-desc">' + (p.description || '') + '</div>' +
        '<div class="product-card-footer">' +
          '<span class="product-price">' + formatPrice(p.price) + '</span>' +
          '<button class="btn btn-primary btn-sm" onclick="addToCart(' + p.id + ', \'' + (p.name || '').replace(/'/g, "\\'") + '\')">Add to Cart</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

document.addEventListener('DOMContentLoaded', loadProducts);
</script>
</body>
</html>
